                - generic [ref=e1305]:
                  - img [ref=e1308]
                  - paragraph [ref=e1310]: Calibrations, email, presentations, content creation, etc., have gotten so much easier. I've seen stats that say Glean saves people 2-3 hours of time a week, but I know it's saving me a lot more time than that, and if you're not using Glean today, you really should be.
            - group [ref=e1311] [cursor=pointer]:
              - generic [ref=e1312]:
                - generic [ref=e1313]:
                  - generic [ref=e1314]:
