                  - generic [ref=e1317]:
                    - paragraph [ref=e1318]: Casey Carlton
                    - paragraph [ref=e1319]: Director of IT & Business Tech
                - generic [ref=e1320]:
                  - img [ref=e1323]
                  - paragraph [ref=e1325]: In my previous roles, I looked at and tried out tools that said they could handle enterprise search, both on-prem and Saas-based, but nothing worked. So, I was skeptical at first. However, Glean quickly proved that my skepticism was invalid.
                  - generic [ref=e1327]:
