                    - img [ref=e1330]
            - group [ref=e1339] [cursor=pointer]:
              - generic [ref=e1340]:
                - generic [ref=e1341]:
                  - generic [ref=e1342]:
                    - img [ref=e1343]
                    - img [ref=e1344]
                  - generic [ref=e1345]:
                    - paragraph [ref=e1346]: Manu Narayan
                    - paragraph [ref=e1347]: VP of IT, Data & Business Operations
                - generic [ref=e1348]:
                  - paragraph [ref=e1350]: It seems every SaaS platform has added some kind of generative feature, but they only have a single window of context. Glean brings the same thoughtful approach they brought to search to enterprise Al.
