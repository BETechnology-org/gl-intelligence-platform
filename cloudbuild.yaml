# ─────────────────────────────────────────────────────────────────────────
# Cloud Build — BL/GL Intelligence Next.js 16 image
# Builds web → pushes to Artifact Registry → deploys to Cloud Run
# Project: trufflesai-loans / Region: us-central1 / Service: gl-intelligence
# ─────────────────────────────────────────────────────────────────────────
steps:
  # 1. Build the Next.js production image with public env vars baked in
  - id: "build-web"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "docker/Dockerfile.web"
      - "-t"
      - "us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/web:$SHORT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/web:latest"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_URL=https://uljbbwfnldikdathtkbh.supabase.co"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=sb_publishable_AZzXefAum4L38L0hBpSNBg_Jn8Mwba8"
      - "."

  # 2. Push to Artifact Registry
  - id: "push-web"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/web"

  # 3. Deploy to Cloud Run (replaces the gl-intelligence service)
  - id: "deploy-cloudrun"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "gl-intelligence"
      - "--image=us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/web:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--timeout=300"
      - "--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1"
      - "--set-secrets=SUPABASE_SERVICE_ROLE_KEY=bl-intelligence-supabase-service-role:latest,ANTHROPIC_API_KEY=bl-intelligence-anthropic-api-key:latest"

images:
  - "us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/web:$SHORT_SHA"
  - "us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/web:latest"

options:
  machineType: "E2_HIGHCPU_8"
  logging: "CLOUD_LOGGING_ONLY"

timeout: "1200s"
