# ─────────────────────────────────────────────────────────────────────────
# Cloud Build — legacy GL Intelligence Flask api image
# Builds → Artifact Registry → deploys to Cloud Run with the Supabase
# review-state backing + audit log + DOCX exports wired in.
# Project: trufflesai-loans / Region: us-central1 / Service: gl-intelligence
# ─────────────────────────────────────────────────────────────────────────
steps:
  - id: build-api
    name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - docker/Dockerfile.api
      - -t
      - us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/api:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/api:latest
      - .

  - id: push-api
    name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/api

  - id: deploy-cloudrun
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gl-intelligence
      - --image=us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/api:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --set-env-vars=ENVIRONMENT=production,APP_VERSION=0.3.0,GOOGLE_CLOUD_PROJECT=trufflesai-loans,GCP_REGION=us-central1,AWS_BEDROCK_REGION=ap-south-1,CLAUDE_MODEL=apac.anthropic.claude-sonnet-4-5-20250929-v1:0,SUPABASE_URL=https://uljbbwfnldikdathtkbh.supabase.co,DEFAULT_COMPANY_ID=00000000-0000-0000-0000-000000000c06
      - --set-secrets=AWS_ACCESS_KEY_ID=AWS_ACCESS_KEY_ID:latest,AWS_SECRET_ACCESS_KEY=AWS_SECRET_ACCESS_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=bl-intelligence-supabase-service-role:latest

images:
  - us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/api:$SHORT_SHA
  - us-central1-docker.pkg.dev/trufflesai-loans/gl-intelligence/api:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
